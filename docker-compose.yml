services:
  postgres:
    image: postgres:16-alpine
    container_name: divineruin-postgres
    ports:
      - "127.0.0.1:55432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-divineruin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-divineruin_dev}
      POSTGRES_DB: ${POSTGRES_DB:-divineruin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-divineruin}"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: divineruin-valkey
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
