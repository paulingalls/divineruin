name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bunx eslint --max-warnings 0 .
      - run: cd e2e && bun install && bunx eslint --max-warnings 0 .
      - run: bunx prettier --check 'apps/**/*.{ts,tsx}' 'packages/**/*.ts'

  test-bun:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: divineruin
          POSTGRES_PASSWORD: divineruin
          POSTGRES_DB: divineruin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U divineruin"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://divineruin:divineruin@localhost:5432/divineruin
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v7
      - run: bun install
      - run: bun run scripts/migrate.ts
      - run: cd scripts && uv sync && uv run python seed_content.py
      - run: bun test --cwd apps/server
      - run: bun test --cwd apps/mobile

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: cd apps/agent && uv sync
      - run: cd apps/agent && uv run ruff check .
      - run: cd apps/agent && uv run ruff format --check .

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: cd apps/agent && uv sync
      - run: cd apps/agent && uv run pytest tests/ -q

  test-e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: divineruin
          POSTGRES_PASSWORD: divineruin
          POSTGRES_DB: divineruin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U divineruin"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://divineruin:divineruin@localhost:5432/divineruin
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      INTERNAL_SECRET: e2e-test-internal-secret
      NODE_ENV: development
      EXPO_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v7
      - run: bun install
      - run: bun run scripts/migrate.ts
      - run: cd scripts && uv sync && uv run python seed_content.py
      - run: cd e2e && bun install
      - run: cd e2e && bunx playwright install --with-deps chromium
      - run: cd e2e && bunx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && !env.ACT }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
